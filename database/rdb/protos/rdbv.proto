syntax = "proto3";
package rdbv;

import "google/protobuf/descriptor.proto";

message MetricHandle {
    uint32 group_id = 1;
    uint32 metric_id = 2;
}

message StorageNumbersPage {
    uint32 update_every = 1;
    repeated fixed32 storage_numbers = 2;
}

message RdbValue {
    oneof Page {
        StorageNumbersPage storage_numbers_page = 1;
    }
}
