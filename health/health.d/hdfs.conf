
# make sure hdfs is running

 template: hdfs_last_collected_secs
    class: distributed file system
component: hdfs
       on: hdfs.heap_memory
     calc: $now - $last_collected_t
    units: seconds ago
    every: 10s
     warn: $this > (($status >= $WARNING)  ? ($update_every) : ( 5 * $update_every))
     crit: $this > (($status == $CRITICAL) ? ($update_every) : (60 * $update_every))
    delay: down 5m multiplier 1.5 max 1h
     info: number of seconds since the last successful data collection
       to: webmaster


# Common

 template: hdfs_capacity_usage
    class: distributed file system
component: hdfs
       on: hdfs.capacity
     calc: ($used) * 100 / ($used + $remaining)
    units: %
    every: 10s
     warn: $this > (($status >= $WARNING)  ? (70) : (80))
     crit: $this > (($status == $CRITICAL) ? (80) : (98))
    delay: down 15m multiplier 1.5 max 1h
     info: used capacity
       to: sysadmin


# NameNode

 template: hdfs_missing_blocks
    class: distributed file system
component: hdfs
       on: hdfs.blocks
     calc: $missing
    units: missing blocks
    every: 10s
     warn: $this > 0
    delay: down 15m multiplier 1.5 max 1h
     info: missing blocks
       to: sysadmin


