 template: mdstat_last_collected
    class: OS Disk
component: system/software raid (disks)
       on: md.disks
     calc: $now - $last_collected_t
    units: seconds ago
    every: 10s
     warn: $this > (($status >= $WARNING)  ? ($update_every) : ( 5 * $update_every))
     crit: $this > (($status == $CRITICAL) ? ($update_every) : (60 * $update_every))
     info: number of seconds since the last successful data collection
       to: sysadmin

 template: mdstat_disks
    class: OS Disk
component: system/software raid (disks)
       on: md.disks
    units: failed devices
    every: 10s
     calc: $down
     crit: $this > 0
     info: Array is degraded!
       to: sysadmin

 template: mdstat_mismatch_cnt
    class: OS Disk
component: system/software raid (disks)
       on: md.mismatch_cnt
    units: unsynchronized blocks
     calc: $count
    every: 60s
     warn: $this > 1024
    delay: up 30m
     info: Mismatch count!
       to: sysadmin

 template: mdstat_nonredundant_last_collected
